<div id="{{ include.id | default: 'plotly-chart' }}" style="width: 100%; height: {{ include.height | default: '500px' }}"></div>

<script>
  (function() {
    // Serialize the incoming Liquid value safely into a JS value. `| jsonify` will
    // emit either a JS literal (object/array) or a JSON-encoded string depending
    // on how the include was called. We handle both cases.
    var data_serialized = {{ include.data | jsonify }};
    var layout_serialized = {{ include.layout | default: "{}" | jsonify }};
    var config_serialized = {{ include.config | default: "{}" | jsonify }};

    function parseMaybeString(s) {
      // If Liquid produced a JS literal (object/array), `typeof s` will be 'object'.
      // If Liquid produced a JSON string, `typeof s` will be 'string' and we try to parse it.
      try {
        if (typeof s === 'string') {
          // Some callers pass a JSON string (from the page include using single quotes).
          // Attempt a normal parse. If that yields another string (double-encoded), parse again.
          var first = JSON.parse(s);
          if (typeof first === 'string') {
            return JSON.parse(first);
          }
          return first;
        }
        return s;
      } catch (e) {
        // Fall back safely to the original value
        return s;
      }
    }

    var data = parseMaybeString(data_serialized) || [];
    var layout = parseMaybeString(layout_serialized) || {};
    var config = parseMaybeString(config_serialized) || {};

    // If the include was passed an object that wraps the usual Plotly keys
    // (i.e. { data: ..., layout: ..., config: ... }), unwrap it.
    if (data && data.data && (Array.isArray(data.data) || typeof data.data === 'object')) {
      config = Object.assign({}, data.config || {}, config);
      layout = Object.assign({}, data.layout || {}, layout);
      data = data.data;
    }

    // Render the plot. Use Plotly.react which is safe to call multiple times.
    if (typeof Plotly !== 'undefined' && Plotly.react) {
      Plotly.react("{{ include.id | default: 'plotly-chart' }}", data, layout, config);
    } else {
      // If Plotly hasn't loaded yet, queue the render for when it becomes available.
      var interval = setInterval(function() {
        if (typeof Plotly !== 'undefined' && Plotly.react) {
          clearInterval(interval);
          Plotly.react("{{ include.id | default: 'plotly-chart' }}", data, layout, config);
        }
      }, 50);
      // Stop trying after a few seconds to avoid runaway timers
      setTimeout(function() { clearInterval(interval); }, 5000);
    }
  })();
</script>
